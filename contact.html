<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Candles | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
            <nav>
                <div class="logo"><a href="index.html">House of Candles</a></div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li>
                        <a href="cart.html"
                            >Cart (<span id="cart-count">0</span>)</a
                        >
                    </li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </header>

    <main>
        <section id="contact">
            <h2 class="reveal">Get in Touch.</h2>
            
            <form id="contact-form" class="reveal" action="https://api.sheetmonkey.io/form/whpe5eGeNkw23Te9WpBSt3" method="POST">
                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="email" name="Email" placeholder="Your Email" required>
                <textarea name="Message" rows="5" placeholder="How can we help you?" required></textarea>
                
                <input type="hidden" name="Created" value="x-sheetmonkey-current-date-time" />
                
                <button type="submit" class="btn">Send Message</button>
            </form>

            <div class="success-message reveal" style="max-width: 600px; margin: 0 auto;">
                <h3>Message Sent!</h3>
                <p>Thank you for reaching out. A member of our team will get back to you within 24 hours.</p>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 House of Candles. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
